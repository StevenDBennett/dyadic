[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dyadic-core"
version = "0.1.0"
description = "dyadic-core: 2-adic arithmetic foundation — DualNumber, discrete log, padic exp/log, Mahler calculus"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Steve", email = "StevenBennettMobile@gmail.com"}]
keywords = ["2-adic", "p-adic", "number-theory", "dual-number", "adic-arithmetic"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Topic :: Scientific/Engineering :: Mathematics",
]
requires-python = ">=3.11"
dependencies = []

[tool.setuptools.packages.find]
where = ["src"]
include = ["dyadic_core*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers --tb=short"
