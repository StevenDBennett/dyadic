name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        run: |
          pip install build
          for pkg in packages/dyadic-core packages/dyadic-math packages/dyadic-ml; do
            python -m build "$pkg"
          done
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
