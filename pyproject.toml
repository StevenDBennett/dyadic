[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "ARG"]
ignore = [
    "N802",  # Function name should be lowercase (math notation in tests: test_C_x_0_is_1)
    "N803",  # Argument name should be lowercase (math notation: M, A, B, L for matrices/log)
    "N806",  # Variable name should be lowercase (math notation: N, L, H, F)
    "SIM108",  # Use ternary operator (if-else is clearer for mathematical expressions)
]

[tool.ruff.lint.per-file-ignores]
"tests/*.py" = ["S101"]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.mypy]
python_version = "3.11"
strict = true
exclude = [
    "build/",
    "dist/",
    "research/",
    "packages/dyadic-core/tests/",
    "packages/dyadic-math/tests/",
]
# numpy has no stubs for most functions
[[tool.mypy.overrides]]
module = "numpy.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = [
    "packages/dyadic-core/tests",
    "packages/dyadic-math/tests",
]
addopts = "-ra --tb=short"
